<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tier-H Audit — Login</title>
<link rel="stylesheet" href="/style.css">
</head>
<body class="login-body">
  <form id="f" class="login-card">
    <h1>Tier-H Audit</h1>
    <p class="muted">frames v1 — MASTERPLAN §9.6.6</p>
    <input id="pw" type="password" placeholder="password" autofocus autocomplete="current-password">
    <button type="submit">Enter</button>
    <p id="err" class="error"></p>
  </form>
  <script>
    document.getElementById('f').addEventListener('submit', async (e) => {
      e.preventDefault();
      const pw = document.getElementById('pw').value;
      const r = await fetch('/api/login', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({password: pw})
      });
      if (r.ok) { location.href = '/'; }
      else {
        const j = await r.json().catch(() => ({error: 'login failed'}));
        document.getElementById('err').textContent = j.error || 'login failed';
        document.getElementById('pw').select();
      }
    });
  </script>
</body>
</html>
